<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Event Registration</h1>
    <form >
        <label for="name1">Name :</label>
        <br>
        <input type="text" name="name" id="name1">
        <br>
        <br>

         <label for="email1">Email :</label>
        <br>
        <input type="text" name="email" id="email1">
        <br>
        <br>

         <label for="phone1">Phone :</label>
        <br>
        <input type="tel" name="phone" id="phone1">
        <br>
        <br>
        <label for="opp">Occupation :</label>
        <select name="oppucation" id="opp">
            <option value="others">Other</option>
            <option value="male">Male</option>
            <option value="male">Female</option>
        </select>
        <br>
        <br>
        <label for="file1">Choose file :</label>
        <input type="file" name="file" id="file1">
        <br>
        <br>
        <label for="number1">Expreience (in years) :</label>
        <input type="number" name="number" id="number1" min="0" max="30">
        <br>
        <br>

       <fieldset>
            <legend>Topic Of Intrest:</legend>
             <label for="check">Topics of Interest :</label>
        <br>
        <br>
        <input type="checkbox" name="check" id="check">
        <br>
        <label for="check">HTML</label>
        <br>
        <br>
        <input type="checkbox" name="check2" id="check">
        <br>
        <label for="check">CSS</label>
        <br>
        <br>
        <input type="checkbox" name="check3" id="check">
        <br>
        <label for="check">JavaScript</label>
        <br>
        <br>
       
       </fieldset>
        <br>
         <label for="txt">Comments :</label>
        <br>
       
        <textarea name="forlong" id="txt" cols="150" rows="10" placeholder="write here"></textarea>
        <input type="submit" value="Register">




    </form>
    



</body>
</html>
