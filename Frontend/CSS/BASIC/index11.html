<!------------------------------------------ CSS GRID ------------------------------------------------->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box; 

        }
        body{
            height: 100vh;
            box-sizing: border-box; 

        }
        .container{
            background-color: rgb(45, 42, 42);
            height: 100%;
            width: 100%;
            display: grid;
            padding: 2rem;
            row-gap: 2rem;
            column-gap: 2rem;
            /* grid-template-rows :1fr 1fr ; */
            grid-template-rows: repeat(4 , 1fr);
            /* grid-template-columns: 1fr 1fr 1fr; */
            grid-template-columns: repeat(3 , 1fr);
        }
        .item{
            background-color: rgb(57, 38, 102);
            border: yellow 3px solid;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            box-shadow: 0px 0px 10px whitesmoke;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            text-shadow: 0px 0px 30px rgb(210, 23, 6);
        }
        #Header{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        #footer{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        #item2{
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 2;
        }
        #item3{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        #item4{
             grid-column-start: 2;
            grid-column-end: 3;
        }
        #item5{
             grid-column-start: 3;
            grid-column-end: 4;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="Header">Header</div>
        <div class="item" id="item2">Item 2</div>
        <div class="item" id="item3">Item 3</div>
        <div class="item" id="item4">Item 4</div>
        <div class="item" id="item5">Item 5</div>
        <div class="item" id="footer">Footer</div>
        
    </div>
    
</body>
</html>
