        /* A4 Print Styling */
        @page {
            size: A4;
            margin: 1cm;
        }
        
        body {
            margin: 0;
            padding: 1cm;
            font-family: Arial, sans-serif;
            background-color: white;
            max-width: 21cm;
        }
        
        @media print {
            body {
                margin: 0;
                padding: 1cm;
                background-color: white;
            }
            .container {
                page-break-inside: avoid;
                height: auto !important;
                width: 100% !important;
                max-width: 19cm;
            }
            .box1, .box2, .box3 {
                page-break-inside: avoid;
            }
        }
