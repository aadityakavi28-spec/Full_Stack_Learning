

<!-- ----------------------------------------------CSS ANIMATIONS ------------------------------------------------------------->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 1px;
            border-radius:5px;
            box-sizing: border-box;
        }
        .container{
            border: solid black 2px;
            background-color: lightblue;
            height: 750px;
            

        }
        .box{
            background-color: rgb(242, 218, 187);
            height: 70px;
            width: 300px;
            border: solid rgb(245, 159, 9) 2px;
            margin: 10px;
            position: relative;
            /* animation-name: rightMovement;
            animation-duration: 5s;
            animation-iteration-count: 10;
            animation-delay: 1s;
            animation-timing-function: linear;  */
            /* animation-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1); */
            /* animation: moveRight 3s cubic-bezier(0.25, 0.1, 0.25, 1) infinite; */
            /* animation-direction: alternate; */
            /* animation-fill-mode: forwards;   this stops the box into the last */
            animation: rightMovement 5s linear 1s 10 alternate none;
        }
        @keyframes rightMovement {
            from {
                top:1px;
                left:0;
            }
            to {
                top: 1px;
                left: 1150px;
            }
        }

        .box2{
            background-color: rgb(242, 218, 187);
            height: 70px;
            width: 300px;
            border: solid rgb(245, 159, 9) 2px;
            margin: 10px;
            position: relative;
            animation: leftMovement 5s linear 1s 10 alternate none;

        }
        @keyframes leftMovement{
            from {
                top: 570px;
                left: 1150px;
            }
            to {
                top: 570px ;
                left: 0;
            }
        }
        .circle{
            background-color: rgb(242, 218, 187);
            height: 70px;
            width: 70px;
            border: solid rgb(245, 159, 9) 2px;
            margin: 10px;
            position: relative;
            border-radius: 50px;
            top: 180px;
            left: 45%;
            animation: circleMovement 5s linear 1s 10 alternate none;

        }
         @keyframes circleMovement {
            0%{
                top: 1%;
                left: 5%;

            }
            30%{
                top: 5%;
                left: 90%;

            }
            60%{
                top: 55%;
                left: 10%;

            }
            100%{
                top: 60%;
                left: 90%;

            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box2"></div>
        <div class="circle"></div>

    </div>
    
</body>
</html>
