<head>

        transition: all 5s linear 0s;
    }
    .box:hover{
        /* transform: rotate(180deg); */
        /* transform: scale(2); */
        /* transform: scale(0.5); */
        /* transform: skew(45deg); */
        /* transform: translate(500px); */
        /* transform: translate(-500px); */
        /* transform: translate(0 , 500px); */
        /* transform: translate(0,-500px); */
        transform: translate(500px,500px);


    }
    p{
        font-size: 20px;
        
    }
</style>
<body>

        <div class="box">
            <p>Demo Box for 2D Transform</p>
