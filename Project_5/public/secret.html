<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Roadmap Flowchart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- vis.js CDN -->
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
    }

    header {
        text-align: center;
        padding: 15px;
        background: linear-gradient(90deg, #06b6d4, #3b82f6);
    }

    #network {
        width: 100%;
        height: 85vh;
        border-top: 2px solid #1e293b;
    }

    .info-box {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: #1e293b;
        padding: 10px;
        border-radius: 10px;
        max-width: 300px;
        font-size: 14px;
    }

    a {
        color: #38bdf8;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<header>
    <h2>🚀 AI Roadmap Flowchart</h2>
    <p>Click nodes to explore strategy & resources</p>
</header>

<div id="network"></div>

<div class="info-box" id="info">
    Click a node to see details...
</div>

<script>
    const nodes = new vis.DataSet([
        { id: 1, label: "Start", color: "#22c55e" },

        { id: 2, label: "Python Basics" },
        { id: 3, label: "Math (Stats + Algebra)" },
        { id: 4, label: "Data Handling" },

        { id: 5, label: "Machine Learning" },
        { id: 6, label: "Deep Learning" },

        { id: 7, label: "NLP" },
        { id: 8, label: "Computer Vision" },

        { id: 9, label: "Projects" },
        { id: 10, label: "Deployment" },

        { id: 11, label: "Placement Ready 🎯", color: "#facc15" }
    ]);

    const edges = new vis.DataSet([
        { from: 1, to: 2 },
        { from: 1, to: 3 },
        { from: 2, to: 4 },
        { from: 3, to: 4 },
        { from: 4, to: 5 },
        { from: 5, to: 6 },
        { from: 6, to: 7 },
        { from: 6, to: 8 },
        { from: 7, to: 9 },
        { from: 8, to: 9 },
        { from: 9, to: 10 },
        { from: 10, to: 11 }
    ]);

    const container = document.getElementById("network");

    const data = {
        nodes: nodes,
        edges: edges
    };

    const options = {
        nodes: {
            shape: "dot",
            size: 18,
            font: { size: 14, color: "#fff" },
            color: "#3b82f6"
        },
        edges: {
            arrows: "to",
            color: "#94a3b8"
        },
        physics: {
            enabled: true
        }
    };

    const network = new vis.Network(container, data, options);

    const info = document.getElementById("info");

    network.on("click", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];

            const details = {
                2: "Learn Python basics → loops, functions<br><a href='https://www.w3schools.com/python/' target='_blank'>Learn Python</a>",
                3: "Focus on probability + linear algebra<br><a href='https://www.khanacademy.org/math' target='_blank'>Learn Math</a>",
                4: "Use Pandas & Numpy for data<br><a href='https://pandas.pydata.org/' target='_blank'>Docs</a>",
                5: "Start ML models (Regression, Classification)",
                6: "Learn Neural Networks, TensorFlow/PyTorch",
                7: "Text processing, Chatbots, Transformers",
                8: "Image processing, OpenCV",
                9: "Build real projects (important for placement)",
                10: "Deploy using Flask / APIs",
                11: "You are ready for AI jobs 🚀"
            };

            info.innerHTML = details[nodeId] || "Explore step-by-step roadmap";
        }
    });
</script>

</body>
</html>
